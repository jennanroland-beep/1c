<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>1C Tracker</title>
<script src="https://apis.google.com/js/api.js" async></script>
<script src="https://accounts.google.com/gsi/client" async></script>
<style>
  :root {
    --cream: #F5F0E8;
    --cream-dark: #EDE6D8;
    --black: #1A1A1A;
    --dark-wood: #3D2B1F;
    --mid-wood: #6B4C35;
    --rust: #A8472A;
    --burgundy: #7A2E3C;
    --warm-gray: #8A8278;
    --border: rgba(61,43,31,0.15);
    --border-strong: rgba(61,43,31,0.3);
    --font: 'Georgia', serif;
    --font-sans: -apple-system, BlinkMacSystemFont, 'Helvetica Neue', sans-serif;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--cream);
    color: var(--black);
    font-family: var(--font-sans);
    font-size: 14px;
    min-height: 100vh;
  }

  header {
    background: var(--dark-wood);
    color: var(--cream);
    padding: 0 24px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    height: 56px;
    position: sticky;
    top: 0;
    z-index: 100;
  }

  header h1 {
    font-family: var(--font);
    font-size: 18px;
    font-weight: normal;
    letter-spacing: 0.05em;
  }

  header h1 span {
    color: var(--rust);
    font-style: italic;
  }

  .drive-btn {
    background: transparent;
    border: 1px solid rgba(245,240,232,0.3);
    color: var(--cream);
    padding: 6px 14px;
    border-radius: 4px;
    cursor: pointer;
    font-size: 12px;
    font-family: var(--font-sans);
    display: flex;
    align-items: center;
    gap: 6px;
    transition: background 0.2s;
  }

  .drive-btn:hover { background: rgba(245,240,232,0.1); }

  .drive-dot {
    width: 7px;
    height: 7px;
    border-radius: 50%;
    background: var(--warm-gray);
  }
  .drive-dot.connected { background: #6BAF7A; }
  .drive-dot.syncing { background: #E8B84B; }
  .drive-dot.error { background: var(--rust); }

  nav {
    background: var(--cream-dark);
    border-bottom: 1px solid var(--border);
    display: flex;
    overflow-x: auto;
    padding: 0 24px;
  }

  nav button {
    background: none;
    border: none;
    border-bottom: 2px solid transparent;
    color: var(--warm-gray);
    cursor: pointer;
    font-family: var(--font-sans);
    font-size: 13px;
    padding: 14px 16px 12px;
    white-space: nowrap;
    transition: color 0.2s;
    letter-spacing: 0.03em;
  }

  nav button:hover { color: var(--black); }
  nav button.active {
    color: var(--dark-wood);
    border-bottom-color: var(--rust);
    font-weight: 500;
  }

  main { padding: 24px; max-width: 1100px; margin: 0 auto; }

  .tab { display: none; }
  .tab.active { display: block; }

  /* OVERVIEW */
  .room-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
    gap: 16px;
    margin-bottom: 32px;
  }

  .room-card {
    background: white;
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 16px 18px;
    cursor: pointer;
    transition: border-color 0.2s, box-shadow 0.2s;
  }

  .room-card:hover {
    border-color: var(--border-strong);
    box-shadow: 0 2px 8px rgba(61,43,31,0.08);
  }

  .room-card h3 {
    font-family: var(--font);
    font-size: 15px;
    font-weight: normal;
    color: var(--dark-wood);
    margin-bottom: 8px;
  }

  .room-progress {
    height: 3px;
    background: var(--cream-dark);
    border-radius: 2px;
    margin-bottom: 10px;
    overflow: hidden;
  }

  .room-progress-fill {
    height: 100%;
    background: var(--rust);
    border-radius: 2px;
    transition: width 0.3s;
  }

  .room-stats {
    display: flex;
    gap: 16px;
    font-size: 12px;
    color: var(--warm-gray);
  }

  .room-stats strong { color: var(--black); }

  /* SHOPPING */
  .section-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 16px;
  }

  .section-header h2 {
    font-family: var(--font);
    font-size: 20px;
    font-weight: normal;
    color: var(--dark-wood);
  }

  .btn {
    background: var(--dark-wood);
    border: none;
    border-radius: 4px;
    color: var(--cream);
    cursor: pointer;
    font-family: var(--font-sans);
    font-size: 13px;
    padding: 8px 16px;
    transition: background 0.2s;
  }

  .btn:hover { background: var(--mid-wood); }

  .btn-ghost {
    background: transparent;
    border: 1px solid var(--border-strong);
    border-radius: 4px;
    color: var(--dark-wood);
    cursor: pointer;
    font-family: var(--font-sans);
    font-size: 13px;
    padding: 7px 14px;
    transition: background 0.2s;
  }

  .btn-ghost:hover { background: var(--cream-dark); }

  .filter-row {
    display: flex;
    gap: 8px;
    margin-bottom: 16px;
    flex-wrap: wrap;
  }

  .filter-btn {
    background: white;
    border: 1px solid var(--border);
    border-radius: 20px;
    color: var(--warm-gray);
    cursor: pointer;
    font-size: 12px;
    padding: 5px 12px;
    transition: all 0.2s;
  }

  .filter-btn:hover, .filter-btn.active {
    background: var(--dark-wood);
    border-color: var(--dark-wood);
    color: var(--cream);
  }

  .shopping-table {
    width: 100%;
    border-collapse: collapse;
  }

  .shopping-table th {
    text-align: left;
    font-size: 11px;
    font-weight: 500;
    color: var(--warm-gray);
    letter-spacing: 0.08em;
    text-transform: uppercase;
    padding: 0 12px 10px 12px;
    border-bottom: 1px solid var(--border);
  }

  .shopping-table td {
    padding: 12px;
    border-bottom: 1px solid var(--border);
    vertical-align: middle;
  }

  .shopping-table tr:last-child td { border-bottom: none; }

  .shopping-table tr:hover td { background: var(--cream-dark); }

  .status-badge {
    border-radius: 20px;
    font-size: 11px;
    font-weight: 500;
    padding: 3px 10px;
    white-space: nowrap;
  }

  .status-to-buy { background: #FEF3E8; color: #A8472A; }
  .status-ordered { background: #FFF8E1; color: #8B6914; }
  .status-arrived { background: #EAF4EE; color: #2D7A47; }
  .status-skip { background: var(--cream-dark); color: var(--warm-gray); }

  .item-name { font-weight: 500; color: var(--black); }
  .item-notes { font-size: 12px; color: var(--warm-gray); margin-top: 2px; }
  .item-link { color: var(--rust); text-decoration: none; font-size: 12px; }
  .item-link:hover { text-decoration: underline; }

  .price { font-variant-numeric: tabular-nums; }

  .action-btns { display: flex; gap: 6px; }
  .icon-btn {
    background: none;
    border: none;
    cursor: pointer;
    color: var(--warm-gray);
    font-size: 16px;
    padding: 4px;
    border-radius: 3px;
    line-height: 1;
    transition: color 0.2s, background 0.2s;
  }
  .icon-btn:hover { color: var(--black); background: var(--cream-dark); }
  .icon-btn.danger:hover { color: var(--rust); }

  /* TODOS */
  .todo-columns {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
    gap: 16px;
  }

  .todo-col {
    background: white;
    border: 1px solid var(--border);
    border-radius: 8px;
    overflow: hidden;
  }

  .todo-col-header {
    background: var(--cream-dark);
    border-bottom: 1px solid var(--border);
    padding: 12px 16px;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .todo-col-header h3 {
    font-size: 13px;
    font-weight: 500;
    color: var(--dark-wood);
    letter-spacing: 0.03em;
  }

  .todo-count {
    background: var(--rust);
    border-radius: 10px;
    color: white;
    font-size: 11px;
    font-weight: 500;
    min-width: 20px;
    padding: 1px 6px;
    text-align: center;
  }

  .todo-list { padding: 8px; }

  .todo-item {
    align-items: flex-start;
    border-radius: 6px;
    display: flex;
    gap: 10px;
    padding: 10px;
    transition: background 0.15s;
  }

  .todo-item:hover { background: var(--cream-dark); }

  .todo-item input[type="checkbox"] {
    accent-color: var(--rust);
    cursor: pointer;
    flex-shrink: 0;
    height: 16px;
    margin-top: 2px;
    width: 16px;
  }

  .todo-text { flex: 1; }
  .todo-title { font-size: 13px; line-height: 1.4; }
  .todo-title.done { color: var(--warm-gray); text-decoration: line-through; }
  .todo-meta { font-size: 11px; color: var(--warm-gray); margin-top: 3px; }
  .todo-room-tag {
    background: var(--cream-dark);
    border-radius: 3px;
    color: var(--mid-wood);
    font-size: 10px;
    font-weight: 500;
    padding: 1px 6px;
  }

  /* INSPO */
  .inspo-rooms {
    display: flex;
    gap: 8px;
    margin-bottom: 20px;
    flex-wrap: wrap;
  }

  .inspo-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
    gap: 12px;
  }

  .inspo-card {
    cursor: zoom-in;
    background: white;
    border: 1px solid var(--border);
    border-radius: 8px;
    overflow: hidden;
    position: relative;
  }

  .inspo-card img {
    display: block;
    height: 160px;
    object-fit: cover;
    width: 100%;
  }

  .inspo-card-body {
    padding: 10px 12px;
  }

  .inspo-card-title {
    font-size: 13px;
    font-weight: 500;
    color: var(--black);
    margin-bottom: 2px;
  }

  .inspo-card-meta {
    font-size: 11px;
    color: var(--warm-gray);
  }

  .inspo-delete {
    background: rgba(26,26,26,0.6);
    border: none;
    border-radius: 50%;
    color: white;
    cursor: pointer;
    font-size: 14px;
    height: 26px;
    line-height: 1;
    opacity: 0;
    position: absolute;
    right: 8px;
    top: 8px;
    transition: opacity 0.2s;
    width: 26px;
  }

  .inspo-card:hover .inspo-delete { opacity: 1; }

  .upload-zone {
    align-items: center;
    border: 2px dashed var(--border-strong);
    border-radius: 8px;
    cursor: pointer;
    display: flex;
    flex-direction: column;
    gap: 8px;
    justify-content: center;
    min-height: 160px;
    padding: 20px;
    text-align: center;
    transition: border-color 0.2s, background 0.2s;
  }

  .upload-zone:hover {
    background: var(--cream-dark);
    border-color: var(--rust);
  }

  .upload-zone p { color: var(--warm-gray); font-size: 13px; }
  .upload-zone input { display: none; }

  /* MODAL */
  .modal-overlay {
    align-items: center;
    background: rgba(26,26,26,0.5);
    bottom: 0;
    display: none;
    justify-content: center;
    left: 0;
    position: fixed;
    right: 0;
    top: 0;
    z-index: 200;
  }

  .modal-overlay.open { display: flex; }

  .modal {
    background: white;
    border-radius: 10px;
    max-height: 90vh;
    overflow-y: auto;
    padding: 24px;
    width: 100%;
    max-width: 500px;
    margin: 16px;
  }

  .modal h2 {
    font-family: var(--font);
    font-size: 18px;
    font-weight: normal;
    color: var(--dark-wood);
    margin-bottom: 20px;
  }

  .form-group { margin-bottom: 16px; }
  .form-group label {
    display: block;
    font-size: 12px;
    font-weight: 500;
    color: var(--warm-gray);
    letter-spacing: 0.05em;
    text-transform: uppercase;
    margin-bottom: 6px;
  }

  .form-group input,
  .form-group select,
  .form-group textarea {
    background: var(--cream);
    border: 1px solid var(--border-strong);
    border-radius: 6px;
    color: var(--black);
    font-family: var(--font-sans);
    font-size: 14px;
    padding: 9px 12px;
    transition: border-color 0.2s;
    width: 100%;
  }

  .form-group textarea { min-height: 80px; resize: vertical; }

  .form-group input:focus,
  .form-group select:focus,
  .form-group textarea:focus {
    border-color: var(--rust);
    outline: none;
  }

  .modal-footer {
    display: flex;
    gap: 10px;
    justify-content: flex-end;
    margin-top: 24px;
    padding-top: 16px;
    border-top: 1px solid var(--border);
  }

  .budget-summary {
    background: white;
    border: 1px solid var(--border);
    border-radius: 8px;
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
    gap: 0;
    margin-bottom: 24px;
    overflow: hidden;
  }

  .budget-cell {
    border-right: 1px solid var(--border);
    padding: 16px 20px;
  }

  .budget-cell:last-child { border-right: none; }
  .budget-label { font-size: 11px; color: var(--warm-gray); letter-spacing: 0.06em; text-transform: uppercase; margin-bottom: 6px; }
  .budget-value { font-family: var(--font); font-size: 22px; color: var(--dark-wood); }
  .budget-value.spent { color: var(--rust); }

  .empty-state {
    color: var(--warm-gray);
    font-size: 13px;
    padding: 32px;
    text-align: center;
  }

  .notes-area {
    background: white;
    border: 1px solid var(--border);
    border-radius: 8px;
    font-family: var(--font-sans);
    font-size: 14px;
    line-height: 1.7;
    min-height: 300px;
    padding: 20px;
    resize: vertical;
    width: 100%;
    color: var(--black);
  }

  .notes-area:focus { border-color: var(--rust); outline: none; }

  .toast {
    background: var(--dark-wood);
    border-radius: 6px;
    bottom: 24px;
    color: var(--cream);
    display: none;
    font-size: 13px;
    padding: 10px 18px;
    position: fixed;
    right: 24px;
    z-index: 300;
  }

  .toast.show { display: block; }

  @media (max-width: 600px) {
    main { padding: 16px; }
    .shopping-table th:nth-child(3),
    .shopping-table td:nth-child(3),
    .shopping-table th:nth-child(4),
    .shopping-table td:nth-child(4) { display: none; }
  }

  /* MOVING */
  .pack-phase {
    font-size: 11px;
    font-weight: 500;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--warm-gray);
    margin: 1.5rem 0 8px;
    padding-bottom: 6px;
    border-bottom: 1px solid var(--border);
  }
  .pack-card {
    background: white;
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 16px 18px;
    margin-bottom: 10px;
    transition: opacity 0.2s;
  }
  .pack-card.today { border-left: 3px solid var(--rust); }
  .pack-card.done { opacity: 0.6; }
  .pack-entry {
    background: var(--cream-dark);
    border-left: 3px solid var(--rust);
    padding: 10px 14px;
    margin: 10px 0;
  }
  .pack-task {
    display: flex;
    align-items: flex-start;
    gap: 10px;
    padding: 7px 0;
    cursor: pointer;
    border-bottom: 1px solid var(--border);
  }
  .pack-task:last-child { border-bottom: none; }
  .pack-task input[type="checkbox"] {
    accent-color: var(--rust);
    cursor: pointer;
    flex-shrink: 0;
    height: 16px;
    margin-top: 2px;
    width: 16px;
    pointer-events: none;
  }
  .pack-task label {
    font-size: 14px;
    color: var(--warm-gray);
    line-height: 1.5;
    cursor: pointer;
    user-select: none;
  }
  .pack-task.done label { text-decoration: line-through; opacity: 0.6; }
  .pack-reward {
    border-radius: 6px;
    padding: 10px 14px;
    margin-top: 12px;
    font-size: 13px;
  }
  .pack-reward.locked { background: var(--cream-dark); color: var(--warm-gray); }
  .pack-reward.unlocked { background: #EAF4EE; color: #2D7A47; }
  .pack-pill {
    font-size: 11px;
    background: var(--cream-dark);
    color: var(--warm-gray);
    padding: 3px 8px;
    border-radius: 20px;
    white-space: nowrap;
  }
</style>
</head>
<body>

<header>
  <h1>1C <span>Tracker</span></h1>
  <button class="drive-btn" onclick="toggleDrive()">
    <div class="drive-dot" id="driveDot"></div>
    <span id="driveLabel">Connect Drive</span>
  </button>
</header>

<nav>
  <button class="active" onclick="switchTab('overview', this)">Overview</button>
  <button onclick="switchTab('shopping', this)">Shopping</button>
  <button onclick="switchTab('todos', this)">To Do</button>
  <button onclick="switchTab('inspo', this)">Inspiration</button>
  <button onclick="switchTab('notes', this)">Notes</button>
  <button onclick="switchTab('moving', this)">Moving</button>
</nav>

<main>

  <!-- OVERVIEW -->
  <div class="tab active" id="tab-overview">
    <div class="section-header" style="margin-bottom:20px;">
      <h2 style="font-family:var(--font);font-size:20px;font-weight:normal;color:var(--dark-wood);">1C Tracker</h2>
    </div>
    <div class="room-grid" id="roomGrid"></div>
    <div class="budget-summary" id="budgetSummary"></div>
  </div>

  <!-- SHOPPING -->
  <div class="tab" id="tab-shopping">
    <div class="section-header">
      <h2>Shopping</h2>
      <button class="btn" onclick="openShoppingModal()">+ Add item</button>
    </div>
    <div class="filter-row" id="shopFilters"></div>
    <div style="background:white;border:1px solid var(--border);border-radius:8px;overflow:hidden;">
      <table class="shopping-table">
        <thead>
          <tr>
            <th>Item</th>
            <th>Room</th>
            <th>Price</th>
            <th>Status</th>
            <th></th>
          </tr>
        </thead>
        <tbody id="shoppingBody"></tbody>
      </table>
    </div>
  </div>

  <!-- TODOS -->
  <div class="tab" id="tab-todos">
    <div class="section-header">
      <h2>To Do</h2>
      <button class="btn" onclick="openTodoModal()">+ Add task</button>
    </div>
    <div class="todo-columns" id="todoColumns"></div>
  </div>

  <!-- INSPO -->
  <div class="tab" id="tab-inspo">
    <div class="section-header">
      <h2>Inspiration</h2>
    </div>
    <div class="inspo-rooms" id="inspoRoomFilter"></div>
    <div class="inspo-grid" id="inspoGrid"></div>
  </div>

  <!-- NOTES -->
  <div class="tab" id="tab-notes">
    <div class="section-header">
      <h2>Notes</h2>
      <button class="btn-ghost" onclick="saveNotes()">Save notes</button>
    </div>
    <textarea class="notes-area" id="notesArea" placeholder="Running notes, decisions, measurements, contractor info..."></textarea>
  </div>
  <!-- MOVING -->
  <div class="tab" id="tab-moving">
    <div class="section-header" style="align-items:flex-start;margin-bottom:8px;">
      <h2>Moving plan</h2>
      <div style="text-align:right;">
        <div style="font-size:12px;color:var(--warm-gray);margin-bottom:3px;">Move day: Fri Jul 10</div>
        <div id="packMeta" style="font-size:13px;color:var(--dark-wood);"></div>
      </div>
    </div>
    <div style="background:var(--cream-dark);border-radius:3px;height:3px;overflow:hidden;margin-bottom:24px;">
      <div id="packProgress" style="height:100%;width:0%;background:var(--rust);border-radius:3px;transition:width 0.4s;"></div>
    </div>
    <div id="packContainer"></div>
  </div>

</main>

<!-- SHOPPING MODAL -->
<div class="modal-overlay" id="shoppingModal">
  <div class="modal">
    <h2 id="shoppingModalTitle">Add item</h2>
    <div class="form-group">
      <label>Item name</label>
      <input type="text" id="sName" placeholder="e.g. Loloi Bleecker rug 8x10">
    </div>
    <div class="form-group">
      <label>Room</label>
      <select id="sRoom"></select>
    </div>
    <div class="form-group">
      <label>Price</label>
      <input type="number" id="sPrice" placeholder="0.00" step="0.01">
    </div>
    <div class="form-group">
      <label>Link</label>
      <input type="url" id="sLink" placeholder="https://...">
    </div>
    <div class="form-group">
      <label>Notes</label>
      <textarea id="sNotes" placeholder="Size, color, variant..."></textarea>
    </div>
    <div class="form-group">
      <label>Status</label>
      <select id="sStatus">
        <option value="to-buy">To buy</option>
        <option value="ordered">Ordered</option>
        <option value="arrived">Arrived</option>
        <option value="skip">Skip</option>
      </select>
    </div>
    <div class="modal-footer">
      <button class="btn-ghost" onclick="closeModal('shoppingModal')">Cancel</button>
      <button class="btn" onclick="saveShoppingItem()">Save</button>
    </div>
  </div>
</div>

<!-- TODO MODAL -->
<div class="modal-overlay" id="todoModal">
  <div class="modal">
    <h2>Add task</h2>
    <div class="form-group">
      <label>Task</label>
      <input type="text" id="tTitle" placeholder="e.g. Order Newport poster">
    </div>
    <div class="form-group">
      <label>Room</label>
      <select id="tRoom"></select>
    </div>
    <div class="form-group">
      <label>Priority</label>
      <select id="tPriority">

function renderOverview() {
  const grid = document.getElementById('roomGrid');
  const rooms = ROOMS.filter(r => r !== 'General');
  grid.innerHTML = rooms.map(room => {
    const todos = data.todos.filter(t => t.room === room);
    const done = todos.filter(t => t.done).length;
    const pct = todos.length ? Math.round(done / todos.length * 100) : 0;
    const shopping = data.shopping.filter(s => s.room === room);
    const arrived = shopping.filter(s => s.status === 'arrived').length;
    return `<div class="room-card" onclick="goToRoom('${room}')">

function cycleStatus(id) {

  const cycle = ['to-buy', 'ordered', 'arrived', 'skip'];
  const idx = cycle.indexOf(item.status);
  item.status = cycle[(idx + 1) % cycle.length];
  save();
  renderShopping();
  renderOverview();
}

function renderTodos() {

let driveSaveTimeout = null;
function driveSave() {
  if (!driveFileId) return;
  clearTimeout(driveSaveTimeout);
  driveSaveTimeout = setTimeout(() => {
    setDriveStatus('syncing');
    const blob = new Blob([JSON.stringify(data)], { type: 'application/json' });
    const form = new FormData();
    form.append('metadata', new Blob([JSON.stringify({ name: FILE_NAME })], { type: 'application/json' }));
    form.append('file', blob);
    fetch(`https://www.googleapis.com/upload/drive/v3/files/${driveFileId}?uploadType=multipart`, {
      method: 'PATCH',
      headers: { Authorization: 'Bearer ' + gapi.client.getToken().access_token },
      body: form
    }).then(() => setDriveStatus('connected')).catch(() => setDriveStatus('error'));
  }, 2000);
}

function setDriveStatus(s) {
  const dot = document.getElementById('driveDot');
  const label = document.getElementById('driveLabel');
  dot.className = 'drive-dot ' + s;
  if (s === 'connected') label.textContent = 'Drive synced';
  else if (s === 'syncing') label.textContent = 'Saving...';
  else if (s === 'error') label.textContent = 'Sync error';
  else label.textContent = 'Connect Drive';
}

function toggleDrive() {
  if (driveFileId) return;
  if (!gapiInited || !gisInited) {
    showToast('Google APIs still loading, try again in a moment');
    return;
  }
  tokenClient.requestAccessToken({ prompt: 'consent' });
}

async function driveInit() {
  await gapi.client.init({ apiKey: API_KEY, discoveryDocs: ['https://www.googleapis.com/discovery/v1/apis/drive/v3/rest'] });
  gapiInited = true;
  maybeEnableDrive();
}

function maybeEnableDrive() {
  if (gapiInited && gisInited) setDriveStatus('');
}

function initGapi() {
  gapi.load('client', driveInit);
}

function initGis() {
  tokenClient = google.accounts.oauth2.initTokenClient({
    client_id: CLIENT_ID,
    scope: SCOPES,
    callback: async (resp) => {
      if (resp.error) { setDriveStatus('error'); return; }
      setDriveStatus('syncing');
      await driveConnect();
    }
  });
  gisInited = true;
  maybeEnableDrive();
}

async function driveConnect() {
  try {
    const list = await gapi.client.drive.files.list({
      spaces: 'appDataFolder',
      q: `name='${FILE_NAME}'`,
      fields: 'files(id)',
      orderBy: 'modifiedTime desc'
    });
    if (list.result.files.length) {
      driveFileId = list.result.files[0].id;
      const file = await gapi.client.drive.files.get({ fileId: driveFileId, alt: 'media' });
      const remote = typeof file.result === 'string' ? JSON.parse(file.result) : file.result;
      data = { ...data, ...remote };
      localStorage.setItem('1c_tracker', JSON.stringify(data));
      document.getElementById('notesArea').dataset.loaded = '';
      render();
      setDriveStatus('connected');
      showToast('Drive connected — data loaded');
    } else {
      const meta = await gapi.client.drive.files.create({
        resource: { name: FILE_NAME, parents: ['appDataFolder'] },
        fields: 'id'
      });
      driveFileId = meta.result.id;
      driveSave();
      setDriveStatus('connected');
      showToast('Drive connected — new file created');
    }
  } catch(e) {
    setDriveStatus('error');
    showToast('Drive connection failed');
  }
}

function tryInitApis() {
  if (typeof gapi !== 'undefined') initGapi();
  else setTimeout(tryInitApis, 400);
}

function tryInitGis() {
  if (typeof google !== 'undefined' && google.accounts) initGis();
  else setTimeout(tryInitGis, 400);
}

function packToday() { return new Date().toISOString().split('T')[0]; }

function packDaysLeft() {
  const n = new Date(); n.setHours(0,0,0,0);
  return Math.max(0, Math.ceil((PACK_MOVE_DATE - n) / 864e5));
}

function packIsDone(q) {
  const ps = data.packingState || {};
  return q.tasks.every((_, i) => ps[q.id + '-' + i]);
}

function packCountDone() { return PACK_QUESTS.filter(packIsDone).length; }

function updatePackHeader() {
  const d = packDaysLeft();
  const c = packCountDone();
  const meta = document.getElementById('packMeta');
  if (meta) {
    const daysStr = d === 0 ? 'Moving day!' : d + (d === 1 ? ' day to go' : ' days to go');
    meta.textContent = daysStr + ' \u00b7 ' + c + ' / 6 quests done';
  }
  const bar = document.getElementById('packProgress');
  if (bar) bar.style.width = (c / 6 * 100) + '%';
}

function packCardHTML(q) {
  const isToday = q.date === packToday();
  const done = packIsDone(q);
  const ps = data.packingState || {};

  const pills = q.zones.map(z => '<span class="pack-pill">' + z + '</span>').join('');

  const tasks = q.tasks.map((task, i) => {
    const checked = !!ps[q.id + '-' + i];
    return '<div class="pack-task' + (checked ? ' done' : '') + '" onclick="togglePackTask(' + q.id + ',' + i + ')">'
      + '<input type="checkbox"' + (checked ? ' checked' : '') + ' />'
      + '<label>' + task + '</label>'
      + '</div>';
  }).join('');

  const rewardLabel = done ? 'Reward unlocked' : 'Complete quest to unlock';
  const rewardText = done ? q.reward : '&middot;&middot;&middot;';

  return '<div class="pack-card' + (isToday ? ' today' : '') + (done ? ' done' : '') + '" id="pc' + q.id + '">'
    + '<div style="display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:8px;">'
    + '<div>'
    + '<div style="font-size:11px;font-weight:500;letter-spacing:0.06em;text-transform:uppercase;color:' + (isToday ? 'var(--rust)' : 'var(--warm-gray)') + ';margin-bottom:3px;">' + (isToday ? '&#9654; ' : '') + q.label + '</div>'
    + '<div style="font-family:var(--font);font-size:16px;color:var(--dark-wood);">' + q.name + '</div>'
    + '</div>'
    + '<div style="display:flex;gap:5px;flex-shrink:0;margin-left:12px;flex-wrap:wrap;justify-content:flex-end;">'
    + pills
    + '<span class="pack-pill">' + q.time + '</span>'
    + '</div>'
    + '</div>'
    + '<div class="pack-entry">'
    + '<div style="font-size:10px;font-weight:500;letter-spacing:0.06em;text-transform:uppercase;color:var(--dark-wood);margin-bottom:4px;">First move</div>'
    + '<div style="font-size:13px;color:var(--black);line-height:1.5;">' + q.entry + '</div>'
    + '</div>'
    + '<div style="margin:10px 0;">' + tasks + '</div>'
    + '<div class="pack-reward ' + (done ? 'unlocked' : 'locked') + '">'
    + '<div style="font-size:10px;font-weight:500;letter-spacing:0.06em;text-transform:uppercase;margin-bottom:3px;">' + rewardLabel + '</div>'
    + '<div>' + rewardText + '</div>'
    + '</div>'
    + '</div>';
}

function togglePackTask(questId, taskIdx) {
  if (!data.packingState) data.packingState = {};
  const key = questId + '-' + taskIdx;
  data.packingState[key] = !data.packingState[key];
  save();
  const q = PACK_QUESTS.find(x => x.id === questId);
  const old = document.getElementById('pc' + questId);
  if (!old) return;
  const tmp = document.createElement('div');
  tmp.innerHTML = packCardHTML(q);
  old.replaceWith(tmp.firstElementChild);
  updatePackHeader();
}

function renderMoving() {
  const container = document.getElementById('packContainer');
  if (!container) return;
  let h = '';
  h += '<div class="pack-phase">Tonight &mdash; Jul 2</div>';
  PACK_QUESTS.slice(0, 1).forEach(q => { h += packCardHTML(q); });
  h += '<div class="pack-phase">The big push &mdash; Jul 5 &amp; 6</div>';
  PACK_QUESTS.slice(1, 3).forEach(q => { h += packCardHTML(q); });
  h += '<div class="pack-phase">Close it out &mdash; Jul 7, 8 &amp; 9</div>';
  PACK_QUESTS.slice(3).forEach(q => { h += packCardHTML(q); });
  container.innerHTML = h;
  updatePackHeader();
}

load();
render();
tryInitApis();
tryInitGis();
</script>
